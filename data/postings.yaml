# GPSA Coach Job Postings
#
# SCHEMA REFERENCE
# ----------------
# Each entry under `postings:` supports the following fields:
#
#   id:           (required) URL-safe identifier, used as the HTML element id
#   team:         (required) Display name shown in the collapsible header
#   active:       (required) true = show on site, false = hide without deleting the entry
#
#   image:        (optional) Path to an image, relative to the site root (e.g. images/foo.jpg)
#                 If set, the image is shown at the top of the posting. Omit or set to null if unused.
#
#   description:  (optional) List of paragraphs shown above the positions section.
#
#   positions:    (optional) List of open positions. Each position supports:
#     - title:          Position name (e.g. "Head Coach")
#       overview:       (optional) A paragraph describing the role
#       duties:         (optional) List of bullet-point responsibilities
#       qualifications: (optional) Per-position qualifications list
#
#   qualifications: (optional) Shared qualifications list shown after all positions.
#
#   contact:      (optional) Contact information block. Supports:
#     intro:      Text before the linked name/email/URL
#     email:      The contact email address (generates a mailto: link)
#     url:        A plain URL (e.g. Google Form link) — used instead of email when set
#     link_text:  Display text for the link (defaults to email or url if omitted)
#     suffix:     Text appended after the link (e.g. ".")
#     closing:    (optional) A closing paragraph after the contact line
#
# WORKFLOW
# --------
# To add a posting:    add a new entry with active: true
# To remove a posting: set active: false (preserves the content for future reuse)
# To update a posting: edit the relevant fields
# Push to main — GitHub Actions will rebuild and deploy automatically.

