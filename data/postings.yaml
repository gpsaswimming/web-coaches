  - id: poquoson-2026
    team: Poquoson Barracudas
    active: true
    image: images/2026-poquoson-asst_coach.png
    description:
      - >
        Contract Position — Assistant Summer Swim Coach for the Poquoson Barracuda Swim Team,
        serving youth ages 5–18. The 2026 summer season begins May 26 and runs through August 2,
        concluding with the GPSA championship meet on August 1 and team banquet on August 2.
    positions:
      - title: Assistant Summer Swim Coach
        duties:
          - >
            Serve as assistant coach for the 2026 Summer Swim Season, working cooperatively with
            the head coach to develop a training program that will effectively improve participants'
            swim performance and techniques. Serves as a role model to participants by exhibiting
            good swim habits, sportsmanship, and conduct.
          - >
            Provide supervision of swimmers and lead practices that are age and skill appropriate
            on a daily basis. Practices begin each evening at approximately 5:30pm–8:30pm.
          - >
            Assist with set up of equipment required for practices and home meets. Properly return
            all equipment to storage at the conclusion of use, including lane lines.
          - >
            Work cooperatively with all coaches to set up entries, times, and swim line-up for
            meets. Utilize the swim team management program to do so.
          - >
            Conduct, take roll, and lead practices with age and skill appropriate skill sessions
            as directed. Be present at team functions including meets, practices, and booster
            club events.
          - >
            Attend all meets; provide line-up and coordination for swimmers to be entered in
            their proper events.
          - >
            Enforce all league and Poquoson Parks & Recreation rules and regulations. Handle
            discipline issues amongst team members and parents as needed, within the team's
            written guidelines and policies. Uphold all rules of Poquoson Pool and all rules
            of other facilities when visiting.
    contact:
      intro: >
        To apply, provide your resume to Gretchen Gochenour, Director, City of Poquoson Office
        of Community Recreation (757-868-3580) at
      email: Gretchen.Gochenour@poquoson-va.gov
      closing: >
        Resume should detail swimming experience, teaching or coaching experience, and documented
        experience working with children. Compensation is based on experience and is negotiable.
        Cover letter should detail any salary or pay history. Applicants must be at least 18 years
        of age. Please include any aquatic certifications or coaching certificates in your resume.

  - id: elizabeth-lake-2025
    team: Elizabeth Lake
    active: false
    description:
      - >
        Are you a passionate swim coach looking for an exciting opportunity to lead and inspire
        a team of dedicated athletes? Do you have a knack for cultivating a positive and supportive
        environment where swimmers can thrive? Elizabeth Lake swim team in Hampton is seeking a
        Head Coach and Assistant Coaches for the upcoming summer season!
      - >
        About Us: Our swim team is located near the Fox Hill area in Hampton. We take pride in our
        commitment to fostering a welcoming and inclusive environment where swimmers of all ages and
        abilities can develop their skills and love for the sport. Our team values sportsmanship,
        camaraderie, and personal growth both in and out of the pool.
    positions:
      - title: Head Coach
        duties:
          - Lead and oversee all aspects of the swim team program
          - Develop and implement training plans to help swimmers reach their full potential
          - Provide technical instruction and feedback to improve stroke technique
          - Coordinate and attend swim meets, practices, and team events
          - Serve as a mentor and role model for athletes and assistant coaches
      - title: Assistant Swim Coaches
        duties:
          - Assist the Head Coach in planning and executing practices and workouts
          - Provide individualized feedback and support to swimmers during training sessions
          - Help organize and manage swim meets, events, and team activities
          - Foster a positive and encouraging atmosphere for swimmers to learn and grow
    qualifications:
      - Passion for swimming and coaching
      - Previous coaching or competitive swimming experience preferred (for Head Coach position)
      - Strong communication, leadership, and organizational skills
      - Ability to work well with swimmers of all ages and skill levels
      - CPR and lifeguard certification (or willingness to obtain)
    contact:
      intro: >
        If you're ready to make a splash as part of the Elizabeth Lake coaching team,
        please contact Vanessa Smeltzer at
      email: azsmeltzer@gmail.com
      closing: >
        Don't miss out on this fantastic opportunity to lead and inspire young swimmers in our
        community! We look forward to welcoming enthusiastic coaches to the Elizabeth Lake pool family.

